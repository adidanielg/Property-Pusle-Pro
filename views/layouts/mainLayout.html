<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title><%= typeof title !== 'undefined' ? title : 'PropertyPulse' %></title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="mobile-web-app-capable" content="yes">

    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PropertyPulse">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <link rel="stylesheet" href="/css/style.css">
</head>
<body
    data-user-id="<%= typeof cliente !== 'undefined' && cliente ? cliente.id : typeof tecnico !== 'undefined' && tecnico ? tecnico.id : '' %>"
    data-user-role="<%= typeof cliente !== 'undefined' && cliente ? 'cliente' : typeof tecnico !== 'undefined' && tecnico ? 'tecnico' : '' %>"
>
<script src="/js/i18n.js"></script>
