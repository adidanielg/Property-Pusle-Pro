<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar usuario — PropertyPulse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:1.5rem">
            <div style="font-size:2rem;margin-bottom:.5rem">🔑</div>
            <h1 style="font-size:1.2rem;font-weight:800;color:var(--text-1);margin-bottom:.25rem" data-i18n="rec.title">¿Olvidaste tu usuario?</h1>
            <p style="font-size:.85rem;color:var(--text-2)" data-i18n="rec.sub">Ingresa tu email y te enviamos tu nombre de usuario.</p>
        </div>

        <% if (success) { %>
        <div style="background:var(--green-soft);color:var(--green);border:1px solid var(--green);border-radius:10px;padding:.85rem 1rem;font-size:.875rem;margin-bottom:1.25rem">
            ✅ <%= success %>
        </div>
        <% } %>

        <% if (error) { %>
        <div style="background:var(--red-soft);color:var(--red);border:1px solid var(--red);border-radius:10px;padding:.85rem 1rem;font-size:.875rem;margin-bottom:1.25rem">
            ❌ <%= error %>
        </div>
        <% } %>

        <form action="/auth/recuperar-usuario" method="POST">
            <div class="form-group">
                <label class="form-label" data-i18n="rec.email">Email de tu cuenta</label>
                <input type="email" name="email" class="form-input" placeholder="tu@email.com" required autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-full mt-2" data-i18n="rec.send">Enviar mi usuario →</button>
        </form>

        <div style="margin-top:1.25rem;text-align:center;font-size:.82rem;color:var(--text-3)">
            <a href="/auth/login" style="color:var(--accent)" data-i18n="rec.back">← Volver al login</a>
        </div>
    </div>
</div>
<script src="/js/i18n.js"></script>
</body>
</html>
