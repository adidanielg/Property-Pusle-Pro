<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Técnico | PropertyPulse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page" style="align-items:flex-start;padding-top:3rem">
    <div class="auth-card" style="max-width:500px;margin:0 auto">

        <div class="auth-logo">
            <div class="mark">🔧</div>
            <h1>Property<span>Pulse</span></h1>
            <p>Únete como técnico</p>
        </div>

        <form id="registerForm" onsubmit="registrar(event)">

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-input" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="text" name="telefono" class="form-input" required>
                </div>
            </div>

            <div class="form-group">
                <label class="form-label">Especialidad principal</label>
                <select name="especialidad" class="form-select" required>
                    <option value="">Selecciona una especialidad...</option>
                    <option value="Climatización (HVAC)">❄️ Climatización (HVAC)</option>
                    <option value="Electricidad">⚡ Electricidad</option>
                    <option value="Plomería">🔧 Plomería</option>
                    <option value="Piscina">🏊 Piscina</option>
                    <option value="Jardinería / Landscaping">🌿 Jardinería / Landscaping</option>
                    <option value="Irrigation / Sistema de riego">💧 Irrigation / Sistema de riego</option>
                    <option value="Pest Control">🐛 Pest Control</option>
                    <option value="Limpieza / Pressure Washing">🧹 Limpieza / Pressure Washing</option>
                    <option value="Electrodomésticos">🏠 Electrodomésticos</option>
                    <option value="Estructura / Reparaciones">🏗️ Estructura / Reparaciones</option>
                    <option value="Seguridad">🔒 Seguridad</option>
                    <option value="General">🛠️ Mantenimiento General</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>
            </div>

            <button type="submit" class="btn btn-full mt-2" style="background:var(--text-1);color:#fff" id="btnSubmit">
                Registrarme
            </button>

            <p class="text-small text-muted mt-2" style="text-align:center">
                ¿Ya tienes cuenta? <a href="/auth/login-tecnico" style="color:var(--accent);font-weight:600">Inicia sesión</a>
            </p>
        </form>
    </div>
</div>

<!-- Modal éxito -->
<div id="successModal" class="modal-overlay">
    <div class="modal" style="max-width:400px;text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">✅</div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:.5rem">¡Registro exitoso!</h2>
        <p style="color:#5c6370;margin-bottom:1rem;font-size:.9rem">
            Guarda tu nombre de usuario para iniciar sesión:
        </p>
        <div id="usernameDisplay" style="
            background:#ede9ff;
            border:2px solid #6c63ff;
            padding:1rem 1.5rem;
            border-radius:10px;
            font-size:1.35rem;
            font-weight:700;
            color:#6c63ff;
            margin-bottom:.75rem;
            letter-spacing:.05em;
        "></div>
        <p style="color:#9aa0ab;font-size:.8rem;margin-bottom:1.5rem">
            📋 Cópialo — lo necesitarás para iniciar sesión
        </p>
        <a href="/auth/login-tecnico" class="btn btn-full" style="background:var(--text-1);color:#fff">Ir a iniciar sesión →</a>
    </div>
</div>

<script>
    async function registrar(e) {
        e.preventDefault();
        const btn  = document.getElementById('btnSubmit');
        const data = Object.fromEntries(new FormData(e.target));
        data.role  = 'tecnico';

        if (data.password !== data.confirm_password) {
            alert('Las contraseñas no coinciden'); return;
        }

        btn.disabled = true; btn.innerText = 'Procesando...';

        try {
            const res    = await fetch('/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(data)
            });
            const result = await res.json();
            if (result.success) {
                document.getElementById('usernameDisplay').innerText = result.username;
                document.getElementById('successModal').classList.add('open');
            } else {
                alert('Error: ' + (result.error || 'Error desconocido'));
            }
        } catch (err) {
            alert('Error de conexión');
        } finally {
            btn.disabled = false; btn.innerText = 'Registrarme';
        }
    }
</script>

</body>
</html>
