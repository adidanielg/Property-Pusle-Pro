<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Password — PropertyPulse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<div class="auth-page">
    <div class="auth-card">
        <div style="text-align:center;margin-bottom:1.5rem">
            <div style="font-size:2rem;margin-bottom:.5rem">🔐</div>
            <h1 style="font-size:1.2rem;font-weight:800;color:var(--text-1);margin-bottom:.25rem">New password</h1>
            <p style="font-size:.85rem;color:var(--text-2)">Enter your new password.</p>
        </div>

        <% if (success) { %>
        <div style="background:var(--green-soft);color:var(--green);border:1px solid var(--green);border-radius:10px;padding:.85rem 1rem;font-size:.875rem;margin-bottom:1.25rem">
            <%= success %>
        </div>
        <div style="text-align:center">
            <a href="/auth/login" class="btn btn-primary">Go to login →</a>
        </div>
        <% } else { %>

        <% if (error) { %>
        <div style="background:var(--red-soft);color:var(--red);border:1px solid var(--red);border-radius:10px;padding:.85rem 1rem;font-size:.875rem;margin-bottom:1.25rem">
            ❌ <%= error %>
        </div>
        <% if (!token) { %>
        <div style="text-align:center">
            <a href="/auth/login" class="btn btn-secondary">← Back to login</a>
        </div>
        <% } %>
        <% } %>

        <% if (token) { %>
        <form action="/auth/reset-password" method="POST">
            <input type="hidden" name="token" value="<%= token %>">
            <div class="form-group">
                <label class="form-label">New password</label>
                <input type="password" name="password" class="form-input" placeholder="Minimum 6 characters" required minlength="6" autofocus>
            </div>
            <div class="form-group">
                <label class="form-label">Confirm password</label>
                <input type="password" name="confirm_password" class="form-input" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full mt-2">Save new password →</button>
        </form>
        <% } %>

        <% } %>

        <div style="margin-top:1.25rem;text-align:center;font-size:.82rem;color:var(--text-3)">
            <a href="/auth/login" style="color:var(--accent)">← Back to login</a>
        </div>
    </div>
</div>
<script src="/js/i18n.js"></script>
</body>
</html>
