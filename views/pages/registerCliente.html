<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Client Registration | PropertyPulse</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PropertyPulse">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page" style="align-items:flex-start;padding-top:3rem;padding-bottom:3rem">
    <div class="auth-card" style="max-width:520px;margin:0 auto">

        <div class="auth-logo">
            <div class="mark">🏢</div>
            <h1>Property<span>Pulse</span></h1>
            <p>Create a client account</p>
        </div>

        <form id="registerForm" onsubmit="registrar(event)">

            <div class="form-group">
                <label class="form-label">Account type</label>
                <select name="tipo_cliente" id="tipo_cliente" class="form-select" onchange="toggleEmpresa(this)">
                    <option value="Individual">👤 Individual</option>
                    <option value="Compania">🏢 Company / Business</option>
                </select>
            </div>

            <!-- Campo empresa — se muestra/oculta según tipo -->
            <div id="campo_empresa" class="form-group" style="display:none;animation:modalIn .2s ease">
                <label class="form-label">Company Name</label>
                <input type="text" name="nombre_empresa" id="nombre_empresa" class="form-input"
                    placeholder="e.g. South Properties LLC">
                <p class="form-hint">📋 This name will appear on your tickets and reports.</p>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">First name</label>
                    <input type="text" name="nombre" class="form-input" required autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label class="form-label">Last name</label>
                    <input type="text" name="apellido" class="form-input" required autocomplete="family-name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">Phone</label>
                    <input type="tel" name="telefono" class="form-input" required autocomplete="tel">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" id="pwd" class="form-input" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm password</label>
                    <input type="password" name="confirm_password" id="pwd2" class="form-input" required autocomplete="new-password">
                </div>
            </div>

            <div id="registerError" class="form-error" style="display:none"></div>

            <button type="submit" class="btn btn-primary btn-full mt-2" id="btnSubmit">
                Create my account
            </button>

            <p class="text-small text-muted mt-2" style="text-align:center">
                <span>Already have an account?</span>
                <a href="/auth/login" style="color:var(--accent);font-weight:600">Sign in</a>
            </p>
        </form>

    </div>
</div>

<!-- ── Modal de usuario creado exitosamente ─────────────────── -->
<div id="successModal" class="modal-overlay">
    <div class="modal" style="max-width:420px;text-align:center">

        <div style="font-size:3.5rem;margin-bottom:1rem;animation:modalIn .3s ease">🎉</div>

        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:.4rem;letter-spacing:-.3px">
            Account created!
        </h2>
        <p style="font-size:.875rem;color:var(--text-2);margin-bottom:1.5rem">
            This is your username to sign in:
        </p>

        <!-- Username display -->
        <div style="background:var(--accent-soft);border:2px solid var(--accent);padding:1.25rem 1.5rem;border-radius:14px;margin-bottom:1rem;position:relative">
            <div style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.4rem;opacity:.7">
                Your username
            </div>
            <div id="usernameDisplay" style="font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:.5px;font-family:var(--font-mono)"></div>
        </div>

        <button onclick="copiarUsername()" id="copyBtn" class="btn btn-secondary btn-full mb-2">
            📋 Copy username
        </button>

        <div style="background:var(--yellow-soft);border-left:3px solid var(--yellow);padding:.75rem 1rem;border-radius:var(--radius-sm);margin-bottom:1.5rem;text-align:left">
            <p style="font-size:.82rem;color:#92400e;font-weight:500">
                ⚠️ <strong>Save it now</strong> — you need it to sign in. We do not use email as username.
            </p>
        </div>

        <a id="goLoginBtn" href="/auth/login" class="btn btn-primary btn-full" onclick="if(sessionStorage.getItem('plan_pendiente'))this.href='/auth/login?plan='+sessionStorage.getItem('plan_pendiente')">
            Go to sign in →
        </a>

    </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/i18n.js"></script>

<script>
    // ── Toggle campo empresa ──────────────────────────────────
    // FIX: usar .value directamente, que siempre es 'Individual' o 'Compania'
    // independiente del texto traducido que se muestre al usuario
    function toggleEmpresa(selectEl) {
        // Si se llama desde onchange pasa el elemento, si no, buscarlo
        const sel   = selectEl || document.getElementById('tipo_cliente');
        const campo = document.getElementById('campo_empresa');
        const input = document.getElementById('nombre_empresa');

        // Comparar el VALUE del option (nunca el texto visible)
        const esCompania = sel.value === 'Compania';

        campo.style.display = esCompania ? 'block' : 'none';
        input.required      = esCompania;
        if (!esCompania) input.value = '';
    }

    // Inicializar al cargar (por si el browser recuerda una selección)
    document.addEventListener('DOMContentLoaded', () => {
        toggleEmpresa();
    });

    // ── Detectar plan en URL ──────────────────────────────────
    const urlParams  = new URLSearchParams(window.location.search);
    const planElegido = urlParams.get('plan') || null;

    // Si hay plan, mostrar badge en el header
    if (planElegido) {
        const badge = document.createElement('div');
        badge.style.cssText = 'background:var(--accent-soft);color:var(--accent);font-size:.78rem;font-weight:700;padding:.4rem 1rem;border-radius:99px;text-align:center;margin-bottom:1rem';
        badge.textContent = '🎯 Selected plan: ' + planElegido.charAt(0).toUpperCase() + planElegido.slice(1);
        const form = document.querySelector('form') || document.querySelector('.auth-card');
        if (form) form.insertBefore(badge, form.firstChild);
    }

    // ── Copiar username ───────────────────────────────────────
    function copiarUsername() {
        const username = document.getElementById('usernameDisplay').textContent;
        const btn = document.getElementById('copyBtn');

        navigator.clipboard.writeText(username).then(() => {
            btn.textContent = '✅ ¡Copied!';
            btn.style.background = 'var(--green-soft)';
            btn.style.color = 'var(--green)';
            setTimeout(() => {
                btn.textContent = '📋 Copy username';
                btn.style.background = '';
                btn.style.color = '';
            }, 2000);
            showToast('✅ Username copied');
        }).catch(() => {
            // Fallback para browsers sin clipboard API
            const el = document.createElement('textarea');
            el.value = username;
            el.style.position = 'fixed';
            el.style.opacity = '0';
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('✅ Copied');
        });
    }

    // ── Registro ──────────────────────────────────────────────
    async function registrar(e) {
        e.preventDefault();

        const errDiv = document.getElementById('registerError');
        errDiv.style.display = 'none';

        const btn  = document.getElementById('btnSubmit');
        const done = btnLoading(btn, 'Creating account...');
        const data = Object.fromEntries(new FormData(e.target));
        data.role  = 'cliente';

        // Validar contraseñas
        if (data.password !== data.confirm_password) {
            errDiv.textContent = '❌ Passwords do not match';
            errDiv.style.display = 'block';
            done();
            return;
        }

        if (data.password.length < 6) {
            errDiv.textContent = '❌ Password must be at least 6 characters';
            errDiv.style.display = 'block';
            done();
            return;
        }

        try {
            const res    = await fetch('/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(data)
            });
            const result = await res.json();

            if (result.success) {
                document.getElementById('usernameDisplay').textContent = result.username;
                // Guardar plan en sessionStorage para después del login
                if (planElegido) sessionStorage.setItem('plan_pendiente', planElegido);
                document.getElementById('successModal').classList.add('open');
            } else {
                errDiv.textContent = '❌ ' + result.error;
                errDiv.style.display = 'block';
                errDiv.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        } catch (err) {
            errDiv.textContent = '❌ Connection error. Please try again.';
            errDiv.style.display = 'block';
        } finally {
            done();
        }
    }
</script>


</body>
</html>
