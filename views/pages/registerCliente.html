<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cliente | PropertyPulse</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
<script src="/js/i18n.js"></script>

<div class="auth-page" style="align-items:flex-start;padding-top:3rem">
    <div class="auth-card" style="max-width:520px;margin:0 auto">

        <div class="auth-logo">
            <div class="mark">🏢</div>
            <h1>Property<span>Pulse</span></h1>
            <p data-i18n="reg.createAccount">Crear cuenta de cliente</p>
        </div>

        <form id="registerForm" onsubmit="registrar(event)">

            <div class="form-group">
                <label class="form-label" data-i18n="reg.accountType">Tipo de cuenta</label>
                <select name="tipo_cliente" id="tipo_cliente" class="form-select" onchange="toggleEmpresa()">
                    <option value="Individual" data-i18n="reg.individual">Cliente Individual</option>
                    <option value="Compania" data-i18n="reg.company">Compañía / Empresa</option>
                </select>
            </div>

            <div id="campo_empresa" class="form-group" style="display:none">
                <label class="form-label" data-i18n="reg.companyName">Nombre de la Empresa</label>
                <input type="text" name="nombre_empresa" id="nombre_empresa" class="form-input"
                    data-i18n-placeholder="reg.companyPlaceholder"
                    placeholder="Ej. Inmobiliaria Sur S.A.">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.firstName">Nombre</label>
                    <input type="text" name="nombre" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.lastName">Apellido</label>
                    <input type="text" name="apellido" class="form-input" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.email">Email</label>
                    <input type="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.phone">Teléfono</label>
                    <input type="text" name="telefono" class="form-input" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.password">Contraseña</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.confirmPassword">Confirmar contraseña</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-2" id="btnSubmit" data-i18n="reg.createAccount">
                Crear mi cuenta
            </button>

            <p class="text-small text-muted mt-2" style="text-align:center">
                <span data-i18n="reg.haveAccount">¿Ya tienes cuenta?</span>
                <a href="/auth/login" style="color:var(--accent);font-weight:600" data-i18n="reg.loginLink">Inicia sesión</a>
            </p>
        </form>

    </div>
</div>

<!-- Modal éxito -->
<div id="successModal" class="modal-overlay">
    <div class="modal" style="text-align:center">
        <div style="font-size:2.5rem;margin-bottom:1rem">🎉</div>
        <h2 style="margin-bottom:.5rem" data-i18n="reg.successTitle">¡Cuenta creada!</h2>
        <p class="text-muted mb-3" data-i18n="reg.successMsg">Guarda tu nombre de usuario para iniciar sesión:</p>
        <div style="background:#ede9ff;border:2px solid #6c63ff;padding:1rem 1.5rem;border-radius:10px;font-size:1.35rem;font-weight:700;color:#6c63ff;margin-bottom:.75rem" id="usernameDisplay"></div>
        <p class="text-small text-muted mb-3" data-i18n="reg.successHint">📋 Cópialo — lo necesitarás para iniciar sesión</p>
        <a href="/auth/login" class="btn btn-primary btn-full" data-i18n="reg.goLogin">Ir a iniciar sesión →</a>
    </div>
</div>

<script>
    function toggleEmpresa() {
        const tipo  = document.getElementById('tipo_cliente').value;
        const campo = document.getElementById('campo_empresa');
        const input = document.getElementById('nombre_empresa');
        campo.style.display = tipo === 'Compania' ? 'block' : 'none';
        input.required = tipo === 'Compania';
        if (tipo !== 'Compania') input.value = '';
    }

    async function registrar(e) {
        e.preventDefault();
        const btn  = document.getElementById('btnSubmit');
        const data = Object.fromEntries(new FormData(e.target));
        data.role  = 'cliente';

        if (data.password !== data.confirm_password) {
            alert(i18n.t('reg.passwordMismatch') || 'Las contraseñas no coinciden');
            return;
        }

        btn.disabled = true;
        btn.textContent = i18n.t('reg.creating');

        try {
            const res    = await fetch('/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(data)
            });
            const result = await res.json();

            if (result.success) {
                document.getElementById('usernameDisplay').textContent = result.username;
                document.getElementById('successModal').classList.add('open');
            } else {
                alert('Error: ' + result.error);
            }
        } catch (err) {
            alert('Error de conexión');
        } finally {
            btn.disabled = false;
            btn.textContent = i18n.t('reg.createAccount');
        }
    }
</script>

</body>
</html>
