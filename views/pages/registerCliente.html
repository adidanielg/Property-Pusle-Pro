<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cliente | PropertyPulse</title>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PropertyPulse">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">

    <script>
    // ── Dark mode inmediato (evita flash) ─────────────────────
    (function() {
        var t = localStorage.getItem('pp_theme') ||
                (document.cookie.match(/pp_theme=([^;]+)/) || [])[1] ||
                (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.documentElement.setAttribute('data-theme', t);
    })();
    </script>
</head>
<body>

<div class="auth-page" style="align-items:flex-start;padding-top:3rem;padding-bottom:3rem">
    <div class="auth-card" style="max-width:520px;margin:0 auto">

        <div class="auth-logo">
            <div class="mark">🏢</div>
            <h1>Property<span>Pulse</span></h1>
            <p>Crear cuenta de cliente</p>
        </div>

        <!-- El form NO tiene action ni method — JS intercepta el submit -->
        <form id="registerForm">

            <div class="form-group">
                <label class="form-label">Tipo de cuenta</label>
                <select name="tipo_cliente" id="tipo_cliente" class="form-select">
                    <option value="Individual">👤 Cliente Individual</option>
                    <option value="Compania">🏢 Compañía / Empresa</option>
                </select>
            </div>

            <div id="campo_empresa" class="form-group" style="display:none">
                <label class="form-label">Nombre de la Empresa</label>
                <input type="text" name="nombre_empresa" id="nombre_empresa" class="form-input"
                    placeholder="Ej. Inmobiliaria Sur S.A.">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Nombre</label>
                    <input type="text" name="nombre" class="form-input" required autocomplete="given-name">
                </div>
                <div class="form-group">
                    <label class="form-label">Apellido</label>
                    <input type="text" name="apellido" class="form-input" required autocomplete="family-name">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Email</label>
                    <input type="email" name="email" class="form-input" required autocomplete="email">
                </div>
                <div class="form-group">
                    <label class="form-label">Teléfono</label>
                    <input type="tel" name="telefono" class="form-input" required autocomplete="tel">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="form-input" required autocomplete="new-password" minlength="6">
                </div>
                <div class="form-group">
                    <label class="form-label">Confirmar contraseña</label>
                    <input type="password" name="confirm_password" class="form-input" required autocomplete="new-password">
                </div>
            </div>

            <div id="registerError" class="form-error" style="display:none"></div>

            <button type="submit" class="btn btn-primary btn-full mt-2" id="btnSubmit">
                Crear mi cuenta
            </button>

            <p class="text-small text-muted mt-2" style="text-align:center">
                ¿Ya tienes cuenta?
                <a href="/auth/login" style="color:var(--accent);font-weight:600">Inicia sesión</a>
            </p>
        </form>

    </div>
</div>

<!-- Modal éxito -->
<div id="successModal" class="modal-overlay">
    <div class="modal" style="max-width:420px;text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">🎉</div>
        <h2 style="font-size:1.3rem;font-weight:800;margin-bottom:.4rem">¡Cuenta creada!</h2>
        <p style="font-size:.875rem;color:var(--text-2);margin-bottom:1.5rem">
            Este es tu nombre de usuario para iniciar sesión:
        </p>
        <div style="background:var(--accent-soft);border:2px solid var(--accent);padding:1.25rem 1.5rem;border-radius:14px;margin-bottom:1rem">
            <div style="font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--accent);margin-bottom:.4rem;opacity:.7">Tu usuario</div>
            <div id="usernameDisplay" style="font-size:1.5rem;font-weight:700;color:var(--accent);letter-spacing:.5px;font-family:monospace"></div>
        </div>
        <button onclick="copiarUsername()" id="copyBtn" class="btn btn-secondary btn-full mb-2">
            📋 Copiar nombre de usuario
        </button>
        <div style="background:var(--yellow-soft);border-left:3px solid var(--yellow);padding:.75rem 1rem;border-radius:6px;margin-bottom:1.5rem;text-align:left">
            <p style="font-size:.82rem;color:#92400e;font-weight:500">
                ⚠️ <strong>Guárdalo ahora</strong> — lo necesitas para iniciar sesión.
            </p>
        </div>
        <a href="/auth/login" class="btn btn-primary btn-full">
            Ir a iniciar sesión →
        </a>
    </div>
</div>

<script>
// ── Todo el JS es inline y autónomo — NO depende de app.js ────

// Toggle campo empresa
document.getElementById('tipo_cliente').addEventListener('change', function() {
    var esCompania = this.value === 'Compania';
    var campo = document.getElementById('campo_empresa');
    var input = document.getElementById('nombre_empresa');
    campo.style.display = esCompania ? 'block' : 'none';
    input.required = esCompania;
    if (!esCompania) input.value = '';
});

// Registro — interceptar el submit
document.getElementById('registerForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // ← SIEMPRE prevenir el submit nativo

    var errDiv = document.getElementById('registerError');
    var btn    = document.getElementById('btnSubmit');

    errDiv.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Creando cuenta...';

    var data = {};
    new FormData(this).forEach(function(val, key) { data[key] = val; });
    data.role = 'cliente';

    if (data.password !== data.confirm_password) {
        errDiv.textContent = '❌ Las contraseñas no coinciden';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Crear mi cuenta';
        return;
    }

    if (data.password.length < 6) {
        errDiv.textContent = '❌ La contraseña debe tener al menos 6 caracteres';
        errDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Crear mi cuenta';
        return;
    }

    try {
        var res    = await fetch('/auth/register', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify(data)
        });
        var result = await res.json();

        if (result.success) {
            document.getElementById('usernameDisplay').textContent = result.username;
            document.getElementById('successModal').classList.add('open');
        } else {
            errDiv.textContent = '❌ ' + (result.error || 'Error al crear cuenta');
            errDiv.style.display = 'block';
        }
    } catch (err) {
        errDiv.textContent = '❌ Error de conexión. Verifica tu internet e intenta nuevamente.';
        errDiv.style.display = 'block';
    }

    btn.disabled = false;
    btn.textContent = 'Crear mi cuenta';
});

// Copiar username
function copiarUsername() {
    var username = document.getElementById('usernameDisplay').textContent;
    var btn = document.getElementById('copyBtn');
    navigator.clipboard.writeText(username).then(function() {
        btn.textContent = '✅ ¡Copiado!';
        setTimeout(function() { btn.textContent = '📋 Copiar nombre de usuario'; }, 2000);
    }).catch(function() {
        var el = document.createElement('textarea');
        el.value = username;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        btn.textContent = '✅ ¡Copiado!';
        setTimeout(function() { btn.textContent = '📋 Copiar nombre de usuario'; }, 2000);
    });
}

// Toggle dark/light
(function() {
    var current = localStorage.getItem('pp_theme') || 'light';
    var btn = document.createElement('button');
    btn.id = 'theme-toggle';
    btn.textContent = current === 'dark' ? '☀️' : '🌙';
    btn.style.cssText = 'position:fixed;top:1rem;right:1rem;z-index:9999;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.35rem .55rem;cursor:pointer;font-size:1rem;box-shadow:0 2px 8px rgba(0,0,0,.07)';
    btn.onclick = function() {
        current = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', current);
        localStorage.setItem('pp_theme', current);
        btn.textContent = current === 'dark' ? '☀️' : '🌙';
        fetch('/auth/set-theme', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({theme: current}) }).catch(function(){});
    };
    document.body.appendChild(btn);
})();
</script>

</body>
</html>
