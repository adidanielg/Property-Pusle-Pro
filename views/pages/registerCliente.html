<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro Cliente | PropertyPulse</title>
    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#6c63ff">
    <meta name="mobile-web-app-capable" content="yes">
    <!-- iOS -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="PropertyPulse">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="auth-page" style="align-items:flex-start;padding-top:3rem">
    <div class="auth-card" style="max-width:520px;margin:0 auto">

        <div class="auth-logo">
            <div class="mark">🏢</div>
            <h1>Property<span>Pulse</span></h1>
            <p data-i18n="reg.createAccount">Crear cuenta de cliente</p>
        </div>

        <form id="registerForm" onsubmit="registrar(event)">

            <div class="form-group">
                <label class="form-label" data-i18n="reg.accountType">Tipo de cuenta</label>
                <select name="tipo_cliente" id="tipo_cliente" class="form-select" onchange="toggleEmpresa()">
                    <option value="Individual" data-i18n="reg.individual">Cliente Individual</option>
                    <option value="Compania" data-i18n="reg.company">Compañía / Empresa</option>
                </select>
            </div>

            <div id="campo_empresa" class="form-group" style="display:none">
                <label class="form-label" data-i18n="reg.companyName">Nombre de la Empresa</label>
                <input type="text" name="nombre_empresa" id="nombre_empresa" class="form-input"
                    data-i18n-placeholder="reg.companyPlaceholder"
                    placeholder="Ej. Inmobiliaria Sur S.A.">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.firstName">Nombre</label>
                    <input type="text" name="nombre" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.lastName">Apellido</label>
                    <input type="text" name="apellido" class="form-input" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.email">Email</label>
                    <input type="email" name="email" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.phone">Teléfono</label>
                    <input type="text" name="telefono" class="form-input" required>
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.password">Contraseña</label>
                    <input type="password" name="password" class="form-input" required>
                </div>
                <div class="form-group">
                    <label class="form-label" data-i18n="reg.confirmPassword">Confirmar contraseña</label>
                    <input type="password" name="confirm_password" class="form-input" required>
                </div>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-2" id="btnSubmit" data-i18n="reg.createAccount">
                Crear mi cuenta
            </button>

            <p class="text-small text-muted mt-2" style="text-align:center">
                <span data-i18n="reg.haveAccount">¿Ya tienes cuenta?</span>
                <a href="/auth/login" style="color:var(--accent);font-weight:600" data-i18n="reg.loginLink">Inicia sesión</a>
            </p>
        </form>

    </div>
</div>

<!-- Modal éxito -->
<div id="successModal" class="modal-overlay" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal" style="max-width:400px;text-align:center">
        <div style="font-size:3rem;margin-bottom:1rem">🎉</div>
        <h2 style="font-size:1.3rem;font-weight:700;margin-bottom:.5rem" data-i18n="reg.successTitle">¡Cuenta creada!</h2>
        <p class="text-muted mb-3" style="font-size:.9rem" data-i18n="reg.successMsg">Este es tu nombre de usuario para iniciar sesión:</p>

        <div style="background:var(--accent-soft);border:2px solid var(--accent);padding:1.25rem 1.5rem;border-radius:12px;margin-bottom:.75rem;position:relative">
            <div id="usernameDisplay" style="font-size:1.6rem;font-weight:700;color:var(--accent);letter-spacing:.5px;font-family:var(--font-mono)"></div>
        </div>

        <button onclick="copiarUsername()" class="btn btn-secondary btn-sm mb-3" style="width:100%">
            📋 Copiar nombre de usuario
        </button>

        <p class="text-small text-muted mb-3" style="background:var(--yellow-soft);padding:.6rem .75rem;border-radius:8px;color:#92400e">
            ⚠️ Guárdalo — lo necesitas para iniciar sesión
        </p>

        <a id="goLoginBtn" href="/auth/login" class="btn btn-primary btn-full" data-i18n="reg.goLogin">
            Ir a iniciar sesión →
        </a>
    </div>
</div>

<script src="/js/app.js"></script>
<script src="/js/theme.js"></script>
<script src="/js/i18n.js"></script>

<script>

    function copiarUsername() {
        const username = document.getElementById('usernameDisplay').textContent;
        navigator.clipboard.writeText(username).then(() => {
            showToast('✅ Nombre de usuario copiado');
        }).catch(() => {
            // fallback
            const el = document.createElement('textarea');
            el.value = username;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            showToast('✅ Copiado');
        });
    }

    function toggleEmpresa() {
        const select = document.getElementById('tipo_cliente');
        const tipo   = select.value;
        const campo  = document.getElementById('campo_empresa');
        const input  = document.getElementById('nombre_empresa');
        const esCompania = tipo === 'Compania' || tipo === 'Company' || select.selectedIndex === 1;
        campo.style.display = esCompania ? 'block' : 'none';
        input.required      = esCompania;
        if (!esCompania) input.value = '';
    }

    async function registrar(e) {
        e.preventDefault();
        const btn  = document.getElementById('btnSubmit');
        const data = Object.fromEntries(new FormData(e.target));
        data.role  = 'cliente';

        if (data.password !== data.confirm_password) {
            alert(i18n.t('reg.passwordMismatch') || 'Las contraseñas no coinciden');
            return;
        }

        btn.disabled = true;
        btn.textContent = i18n.t('reg.creating');

        try {
            const res    = await fetch('/auth/register', {
                method:  'POST',
                headers: { 'Content-Type': 'application/json' },
                body:    JSON.stringify(data)
            });
            const result = await res.json();

            if (result.success) {
                document.getElementById('usernameDisplay').textContent = result.username;
                document.getElementById('successModal').classList.add('open');
            } else {
                alert('Error: ' + result.error);
            }
        } catch (err) {
            alert('Error de conexión');
        } finally {
            btn.disabled = false;
            btn.textContent = i18n.t('reg.createAccount');
        }
    }
</script>

</body>
</html>
