<%- include('../layouts/mainLayout.html') %>

<div class="auth-page">
    <div class="auth-card">

        <div class="auth-logo">
            <div class="mark">🏢</div>
            <h1>Property<span>Pulse</span></h1>
            <p data-i18n="login.clientPortal">Portal de Clientes</p>
        </div>

        <% if (error) { %>
            <div class="form-error"><%= error %></div>
        <% } %>

        <form action="/auth/login" method="POST" id="loginForm">
            <input type="hidden" name="plan" id="planHidden">
            <input type="hidden" name="role" value="cliente">

            <div class="form-group">
                <label class="form-label" data-i18n="login.username">Usuario</label>
                <input type="text" name="username" class="form-input" data-i18n-placeholder="login.username" placeholder="Tu nombre de usuario" required autofocus>
            </div>

            <div class="form-group">
                <label class="form-label" data-i18n="login.password">Contraseña</label>
                <input type="password" name="password" class="form-input" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full mt-2" data-i18n="login.enter">Ingresar</button>
        </form>

        <p class="text-small text-muted mt-3" style="text-align:center">
            <span data-i18n="login.noAccount">¿No tienes cuenta?</span>
            <a href="/auth/register-cliente" style="color:var(--accent);font-weight:600" data-i18n="login.register">Regístrate gratis</a>
            <br>
            <a href="/auth/recuperar-usuario" style="color:var(--text-3);font-size:.8rem">¿Olvidaste tu usuario?</a>
        </p>
        <p class="text-small text-muted mt-1" style="text-align:center">
            <span data-i18n="login.areTech">¿Eres técnico?</span>
            <a href="/auth/login-tecnico" style="color:var(--accent)" data-i18n="login.enterHere">Ingresa aquí</a>
        </p>

    </div>
</div>


<script>
// Mostrar banner si viene de sesión expirada
// Leer plan de URL o sessionStorage
const loginParams = new URLSearchParams(window.location.search);
const planParam   = loginParams.get('plan') || sessionStorage.getItem('plan_pendiente');
if (planParam) {
    const h = document.getElementById('planHidden');
    if (h) h.value = planParam;
    // Mostrar badge
    const badge = document.createElement('div');
    badge.style.cssText = 'background:var(--accent-soft);color:var(--accent);font-size:.78rem;font-weight:700;padding:.4rem 1rem;border-radius:99px;text-align:center;margin-bottom:1rem';
    badge.textContent = '🎯 Plan: ' + planParam.charAt(0).toUpperCase() + planParam.slice(1) + ' — inicia sesión para pagar';
    const form = document.getElementById('loginForm');
    if (form) form.insertBefore(badge, form.firstChild);
}

if (new URLSearchParams(window.location.search).get('expired') === '1') {
    const banner = document.createElement('div');
    banner.style.cssText = 'background:rgba(245,200,66,.12);border:1px solid rgba(245,200,66,.3);color:#f5c842;padding:.75rem 1rem;border-radius:8px;font-size:.875rem;margin-bottom:1rem;text-align:center;';
    banner.textContent = '⏱️ Your session expired. Please log in again.';
    const form = document.querySelector('form');
    if (form) form.insertBefore(banner, form.firstChild);
    // Limpiar URL
    history.replaceState({}, '', window.location.pathname);
}
</script>

<script src="/js/app.js"></script>
<script src="/js/i18n.js"></script>
<div style="position:fixed;top:1rem;right:1rem;z-index:9999"><div id="lang-toggle" style="display:flex;gap:.2rem;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:8px;padding:.2rem">
    <button id="lang-es" style="padding:.25rem .55rem;border:none;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;background:transparent;color:rgba(255,255,255,.4)">ES</button>
    <button id="lang-en" style="padding:.25rem .55rem;border:none;border-radius:6px;font-size:.75rem;font-weight:700;cursor:pointer;transition:all .15s;background:transparent;color:rgba(255,255,255,.4)">EN</button>
</div></div>
</body>
</html>
