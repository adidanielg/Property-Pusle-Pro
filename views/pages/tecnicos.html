<!DOCTYPE html>
<html lang="es" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Técnicos — PropertyPulse</title>
    <link rel="icon" type="image/x-icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tec-page { max-width: 1000px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }
        .tec-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 2rem; flex-wrap: wrap; gap: 1rem; }
        .tec-logo { font-weight: 800; font-size: 1.1rem; color: var(--text-1); text-decoration: none; }
        .tec-logo span { color: var(--accent); }
        .tec-title { font-size: 1.6rem; font-weight: 800; letter-spacing: -.5px; color: var(--text-1); margin-bottom: .3rem; }
        .tec-sub { font-size: .9rem; color: var(--text-2); margin-bottom: 1.75rem; }
        .tec-filters { display: flex; gap: .6rem; flex-wrap: wrap; margin-bottom: 1.75rem; }
        .tec-filter-btn {
            padding: .35rem .85rem; border-radius: 99px; font-size: .78rem; font-weight: 600;
            border: 1px solid var(--border); background: var(--surface);
            color: var(--text-2); cursor: pointer; transition: all .15s;
        }
        .tec-filter-btn:hover { border-color: var(--accent); color: var(--accent); }
        .tec-filter-btn.active { background: var(--accent-soft); border-color: var(--accent); color: var(--accent); }
        .tec-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 1rem; }
        .tec-card {
            background: var(--surface); border: 1px solid var(--border);
            border-radius: 16px; padding: 1.4rem;
            transition: border-color .15s, transform .15s;
            cursor: pointer;
        }
        .tec-card:hover { border-color: var(--accent); transform: translateY(-3px); }
        .tec-avatar {
            width: 48px; height: 48px; border-radius: 50%;
            background: var(--accent-soft); border: 2px solid var(--accent);
            display: flex; align-items: center; justify-content: center;
            font-weight: 800; font-size: 1rem; color: var(--accent);
            flex-shrink: 0;
        }
        .tec-disponible { background: var(--green-soft); color: var(--green); }
        .tec-ocupado    { background: var(--surface-2);   color: var(--text-3); }
        .tec-stat-box {
            background: var(--surface-2); border-radius: 10px;
            padding: .65rem; text-align: center; flex: 1;
        }
        .tec-stat-num { font-size: 1.3rem; font-weight: 800; color: var(--text-1); line-height: 1; }
        .tec-stat-lbl { font-size: .65rem; color: var(--text-3); margin-top: .2rem; }
        .tec-empty { text-align: center; padding: 3rem; color: var(--text-3); grid-column: 1/-1; }

        /* Modal */
        .modal-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.7); backdrop-filter:blur(6px); z-index:1000; align-items:center; justify-content:center; padding:1rem; }
        .modal-overlay.open { display:flex; }
        .modal { background:var(--surface); border:1px solid var(--border); border-radius:20px; padding:1.75rem; width:100%; max-width:420px; max-height:85vh; overflow-y:auto; }
        .modal-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:1rem; }
        .modal-header h2 { font-size:1rem; font-weight:700; }
        .modal-close { background:none; border:none; color:var(--text-2); font-size:1.1rem; cursor:pointer; padding:.25rem; }
    </style>
</head>
<body>
<div class="tec-page">

    <!-- Header -->
    <div class="tec-header">
        <a href="/" class="tec-logo">🏢 Property<span>Pulse</span></a>
        <a href="/app" class="btn btn-primary" style="font-size:.85rem;padding:.45rem 1rem">Iniciar sesión →</a>
    </div>

    <h1 class="tec-title">Técnicos disponibles</h1>
    <p class="tec-sub">Encuentra el especialista para tu próximo trabajo de mantenimiento.</p>

    <!-- Filtros -->
    <div class="tec-filters" id="filtros">
        <button class="tec-filter-btn active" onclick="filtrar('')" data-esp="">Todos</button>
        <button class="tec-filter-btn" onclick="filtrar('Climatización (HVAC)')" data-esp="Climatización (HVAC)">❄️ HVAC</button>
        <button class="tec-filter-btn" onclick="filtrar('Electricidad')" data-esp="Electricidad">⚡ Electricidad</button>
        <button class="tec-filter-btn" onclick="filtrar('Plomería')" data-esp="Plomería">🔧 Plomería</button>
        <button class="tec-filter-btn" onclick="filtrar('Piscina')" data-esp="Piscina">🏊 Piscina</button>
        <button class="tec-filter-btn" onclick="filtrar('Jardinería / Landscaping')" data-esp="Jardinería / Landscaping">🌿 Jardinería</button>
        <button class="tec-filter-btn" onclick="filtrar('Pest Control')" data-esp="Pest Control">🐛 Pest Control</button>
        <button class="tec-filter-btn" onclick="filtrar('Limpieza / Pressure Washing')" data-esp="Limpieza / Pressure Washing">🧹 Limpieza</button>
        <button class="tec-filter-btn" onclick="filtrar('Electrodomésticos')" data-esp="Electrodomésticos">🏠 Electrodomésticos</button>
        <button class="tec-filter-btn" onclick="filtrar('Estructura / Reparaciones')" data-esp="Estructura / Reparaciones">🏗️ Estructura</button>
        <button class="tec-filter-btn" onclick="filtrar('Seguridad')" data-esp="Seguridad">🔒 Seguridad</button>
        <button class="tec-filter-btn" onclick="filtrar('Handyman')" data-esp="Handyman">🛠️ Handyman</button>
    </div>

    <!-- Grid -->
    <div class="tec-grid" id="tecGrid">
        <div class="tec-empty">Cargando técnicos...</div>
    </div>

</div>

<!-- Modal perfil -->
<div id="perfilModal" class="modal-overlay">
    <div class="modal">
        <div class="modal-header">
            <h2>Perfil del técnico</h2>
            <button class="modal-close" onclick="cerrarPerfil()">✕</button>
        </div>
        <div id="perfilBody"></div>
    </div>
</div>

<script>
let todos = [];
let filtroActual = '';

async function cargar() {
    try {
        const res  = await fetch('/pub/tecnicos');
        const data = await res.json();
        todos = data.tecnicos || [];
        renderizar(todos);
    } catch {
        document.getElementById('tecGrid').innerHTML = '<div class="tec-empty">Error cargando técnicos.</div>';
    }
}

function filtrar(esp) {
    filtroActual = esp;
    document.querySelectorAll('.tec-filter-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.esp === esp);
    });
    const lista = esp ? todos.filter(t => t.especialidad === esp) : todos;
    renderizar(lista);
}

function renderizar(lista) {
    const grid = document.getElementById('tecGrid');
    if (!lista.length) {
        grid.innerHTML = '<div class="tec-empty">No hay técnicos para esta especialidad.</div>';
        return;
    }
    grid.innerHTML = lista.map(t => {
        const ini = t.nombre.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
        const stars = t.promedio ? Math.round(parseFloat(t.promedio)) : 0;
        const starsHtml = stars > 0 ? '⭐'.repeat(stars) : '';
        return `
        <div class="tec-card" onclick="verPerfil('${t.id}')">
            <div style="display:flex;align-items:center;gap:.75rem;margin-bottom:1rem">
                <div class="tec-avatar">${ini}</div>
                <div style="flex:1;min-width:0">
                    <div style="font-weight:700;color:var(--text-1);font-size:.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${t.nombre}</div>
                    <div style="font-size:.75rem;color:var(--text-3);margin-top:.1rem">${t.especialidad}</div>
                </div>
                <span class="tec-filter-btn ${t.ocupado ? 'tec-ocupado' : 'tec-disponible'}" style="font-size:.65rem;padding:.2rem .5rem;cursor:default">
                    ${t.ocupado ? '○ Ocupado' : '● Disponible'}
                </span>
            </div>

            <div style="display:flex;gap:.5rem;margin-bottom:${t.totalCalif > 0 ? '.65rem' : '0'}">
                <div class="tec-stat-box">
                    <div class="tec-stat-num" style="color:var(--accent)">${t.trabajos_completados || 0}</div>
                    <div class="tec-stat-lbl">trabajos</div>
                </div>
                <div class="tec-stat-box">
                    <div class="tec-stat-num" style="color:${t.promedio ? 'var(--yellow)' : 'var(--text-3)'}">${t.promedio ? parseFloat(t.promedio).toFixed(1) : '—'}</div>
                    <div class="tec-stat-lbl">rating</div>
                </div>
                <div class="tec-stat-box">
                    <div class="tec-stat-num">${t.totalCalif}</div>
                    <div class="tec-stat-lbl">reseñas</div>
                </div>
            </div>

            ${t.totalCalif > 0 ? `<div style="font-size:.72rem;color:var(--text-3)">${starsHtml} ${t.totalCalif} reseña${t.totalCalif !== 1 ? 's' : ''}</div>` : ''}
        </div>`;
    }).join('');
}

async function verPerfil(id) {
    const t = todos.find(t => t.id === id);
    if (!t) return;

    const ini = t.nombre.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();

    let reseñasHtml = '<p style="color:var(--text-3);font-size:.82rem;text-align:center;padding:.75rem">Sin reseñas aún.</p>';
    try {
        const res  = await fetch('/pub/tecnicos/' + id + '/resenas');
        const data = await res.json();
        if (data.resenas?.length) {
            reseñasHtml = data.resenas.map(r => `
            <div style="padding:.7rem 0;border-bottom:1px solid var(--border)">
                <div style="display:flex;justify-content:space-between;margin-bottom:.2rem">
                    <span style="font-size:.82rem">${'⭐'.repeat(r.estrellas)}</span>
                    <span style="font-size:.7rem;color:var(--text-3)">${new Date(r.created_at).toLocaleDateString('es',{month:'short',year:'numeric'})}</span>
                </div>
                ${r.comentario ? `<p style="font-size:.8rem;color:var(--text-2);margin:0">${r.comentario}</p>` : ''}
            </div>`).join('');
        }
    } catch {}

    document.getElementById('perfilBody').innerHTML = `
    <div style="text-align:center;margin-bottom:1.25rem">
        <div style="width:60px;height:60px;border-radius:50%;background:var(--accent-soft);border:3px solid var(--accent);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.1rem;color:var(--accent);margin:0 auto .75rem">${ini}</div>
        <div style="font-weight:800;font-size:1.1rem;color:var(--text-1)">${t.nombre}</div>
        <div style="font-size:.82rem;color:var(--text-3);margin:.2rem 0 .5rem">${t.especialidad}</div>
        <span style="font-size:.7rem;font-weight:700;padding:.2rem .65rem;border-radius:99px;background:${!t.ocupado?'var(--green-soft)':'var(--surface-2)'};color:${!t.ocupado?'var(--green)':'var(--text-3)'}">
            ${!t.ocupado ? '● Disponible' : '○ Ocupado'}
        </span>
    </div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1.25rem">
        <div class="tec-stat-box"><div class="tec-stat-num" style="color:var(--accent)">${t.trabajos_completados||0}</div><div class="tec-stat-lbl">Trabajos</div></div>
        <div class="tec-stat-box"><div class="tec-stat-num" style="color:var(--yellow)">${t.promedio?parseFloat(t.promedio).toFixed(1):'—'}</div><div class="tec-stat-lbl">Rating</div></div>
        <div class="tec-stat-box"><div class="tec-stat-num">${t.totalCalif||0}</div><div class="tec-stat-lbl">Reseñas</div></div>
    </div>
    <div style="font-size:.78rem;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.04em;margin-bottom:.6rem">Reseñas recientes</div>
    <div style="max-height:220px;overflow-y:auto">${reseñasHtml}</div>
    <a href="/app" class="btn btn-primary btn-full" style="margin-top:1.25rem;text-align:center">Contratar a través de PropertyPulse →</a>
    `;

    document.getElementById('perfilModal').classList.add('open');
}

function cerrarPerfil() {
    document.getElementById('perfilModal').classList.remove('open');
}

document.getElementById('perfilModal').addEventListener('click', e => {
    if (e.target === document.getElementById('perfilModal')) cerrarPerfil();
});

cargar();
</script>

<script src="/js/i18n.js"></script>
</body>
</html>
